name: Apply CourseLab Windows launch

on:
  push:
    branches:
      - agent/courselab-windows-real-fix
    paths:
      - '.github/workflows/apply-courselab-windows-launch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/courselab-windows-real-fix
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply canonical CourseLab update
        run: node tools/apply-courselab-windows-launch.mjs

      - name: Rebuild exact generated outputs
        run: |
          node tools/build-asset-manifest.mjs
          node tools/append-app-icon-runtime.mjs
          node tools/build-catalog.mjs
          node tools/build-bt-tools-feed.mjs

      - name: Verify CourseLab Windows output
        run: |
          grep -q '9mzx7h0whbcc' data/bt-catalog.json
          grep -q '9mzx7h0whbcc' public/index.html
          grep -q '9mzx7h0whbcc' public/apps/courselab-beam/index.html
          grep -q '/assets/apps/courselab-beam/windows/shot-01.png' public/store-assets.generated.js
          grep -q '/assets/apps/courselab-beam/windows/shot-06.png' public/store-assets.generated.js
          grep -q 'Windows, Android' public/apps/courselab-beam/index.html
          npm run test:product-pages
          node tools/test-app-icons.mjs

      - name: Remove temporary migration machinery
        run: |
          rm -f tools/apply-courselab-windows-launch.mjs
          rm -f .github/workflows/apply-courselab-windows-launch.yml

      - name: Commit actual rebuilt files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Register CourseLab Beam for Windows and show screenshots"
          git push origin HEAD:agent/courselab-windows-real-fix
