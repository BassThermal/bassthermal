name: Apply CourseLab Windows launch

on:
  push:
    branches:
      - agent/courselab-windows-launch
    paths:
      - 'tools/apply-courselab-windows-launch.mjs'
      - '.github/workflows/apply-courselab-windows-launch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/courselab-windows-launch
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply canonical CourseLab update
        run: node tools/apply-courselab-windows-launch.mjs

      - name: Rebuild site and asset manifest
        run: npm run build:site

      - name: Run focused validation
        run: |
          npm run test:product-pages
          npm run test:app-icons

      - name: Commit rebuilt CourseLab launch files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bt-catalog.json public/index.html public/catalog.json public/catalog-lite.json public/bt-tools-feed.v1.json public/bt-tools-feed.v1.js public/store-assets.generated.js public/apps/courselab-beam/index.html
          git commit -m "Register CourseLab Beam for Windows and Android"
          git push
