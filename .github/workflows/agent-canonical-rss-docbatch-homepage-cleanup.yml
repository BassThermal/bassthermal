name: Agent canonical RSS and asset migration

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/agent-canonical-rss-docbatch-homepage-cleanup.mjs
      - tools/test-app-icons.mjs
      - .github/workflows/agent-canonical-rss-docbatch-homepage-cleanup.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/canonical-rss-docbatch-homepage-cleanup' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply migration
        id: migrate
        continue-on-error: true
        run: |
          set -o pipefail
          node tools/agent-canonical-rss-docbatch-homepage-cleanup.mjs 2>&1 | tee migration.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-log
          path: migration.log
      - name: Rebuild generated site data
        if: steps.migrate.outcome == 'success'
        run: npm run build:site
      - name: Run regression tests
        id: tests
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            npm run test:redirects
            npm run test:product-pages
            npm run test:app-icons
            npm run test:terminal-visits
            git diff --check
          } 2>&1 | tee tests.log
      - uses: actions/upload-artifact@v4
        if: always() && steps.migrate.outcome == 'success'
        with:
          name: regression-log
          path: tests.log
      - name: Remove one-time migration files
        if: steps.migrate.outcome == 'success' && steps.tests.outcome == 'success'
        run: |
          rm tools/agent-canonical-rss-docbatch-homepage-cleanup.mjs
          rm .github/workflows/agent-canonical-rss-docbatch-homepage-cleanup.yml
      - name: Commit migration result
        if: steps.migrate.outcome == 'success' && steps.tests.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Canonicalize RSS Crawler and normalize app icons"
          git push origin HEAD:${{ github.head_ref }}
      - name: Fail unsuccessful migration or tests
        if: steps.migrate.outcome != 'success' || steps.tests.outcome != 'success'
        run: exit 1
