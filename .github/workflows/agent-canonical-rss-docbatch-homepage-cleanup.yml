name: Agent canonical RSS and asset migration

on:
  push:
    branches:
      - agent/canonical-rss-docbatch-homepage-cleanup

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply migration
        run: node tools/agent-canonical-rss-docbatch-homepage-cleanup.mjs
      - name: Rebuild generated site data
        run: npm run build:site
      - name: Run regression tests
        run: |
          npm run test:redirects
          npm run test:product-pages
          npm run test:app-icons
          npm run test:terminal-visits
          git diff --check
      - name: Remove one-time migration files
        run: |
          rm tools/agent-canonical-rss-docbatch-homepage-cleanup.mjs
          rm .github/workflows/agent-canonical-rss-docbatch-homepage-cleanup.yml
      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Canonicalize RSS Crawler and normalize app icons"
          git push
