name: Apply site visual system
on:
  push:
    branches: [agent/site-visual-system]
permissions:
  contents: write
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/site-visual-system
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply migration
        run: node tools/agent-site-visual-system.mjs
      - name: Build and validate
        run: |
          npm run build:site
          npm run catalog:validate
          npm run test:redirects
          npm run test:product-pages
          npm run test:terminal-visits
          npm run test:app-icons
          git diff --check
      - name: Remove one-time files
        run: |
          rm tools/agent-site-visual-system.mjs
          rm .github/workflows/agent-site-visual-system.yml
      - name: Commit changes
        run: |
          git config user.name "BassThermal Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Refine universal site visual system"
          git push origin HEAD:agent/site-visual-system
# trigger
