name: Fix homepage catalog sync

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/fix-homepage-catalog-sync.mjs
      - .github/workflows/fix-homepage-catalog-sync.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/legacy-rss-homepage-compat' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply repair
        run: node tools/fix-homepage-catalog-sync.mjs
      - name: Rebuild and test
        run: |
          npm run build:site
          npm run catalog:validate
          npm run test:redirects
          npm run test:app-icons
          npm run test:terminal-visits
          git diff --check
      - name: Remove one-time files
        run: |
          rm tools/fix-homepage-catalog-sync.mjs
          rm .github/workflows/fix-homepage-catalog-sync.yml
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix homepage catalog synchronization"
          git push origin HEAD:${{ github.head_ref }}
