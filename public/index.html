  <style>
    :root {
      color-scheme: dark;

      --bg: #000;
      --fg: #c9d1d9;
      --soft: #8b949e;
      --dim: #484f58;
      --dead: #30363d;
      --hot: #f0f6fc;

      --ok: #7ee787;
      --warn: #d29922;
      --bad: #ff7b72;
      --violet: #d2a8ff;

      --web: #79c0ff;
      --windows: #58a6ff;
      --android: #7ee787;
      --store: #d2a8ff;
      --info: #ffa657;

      --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #000;
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.42;
      overflow: hidden;
    }

    body {
      padding: max(12px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }

    a,
    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible,
    button:hover,
    button:focus-visible {
      color: var(--hot);
      text-decoration: underline;
      outline: 0;
    }

    button {
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
    }

    ::selection {
      background: var(--fg);
      color: #000;
    }

    .terminal {
      width: min(1220px, 100%);
      height: calc(100svh - max(22px, env(safe-area-inset-top)) - max(18px, env(safe-area-inset-bottom)));
      display: grid;
      grid-template-rows: auto minmax(145px, auto) 1fr auto;
      gap: 8px;
      overflow: hidden;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--dim);
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topline strong {
      color: var(--hot);
      font-weight: 700;
    }

    .right {
      color: var(--dim);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .index,
    .log {
      overflow: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      overscroll-behavior: contain;
    }

    .index::-webkit-scrollbar,
    .log::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .table {
      display: grid;
      gap: 0;
    }

    .row {
      display: grid;
      grid-template-columns: 36px minmax(158px, 1.05fr) minmax(136px, 0.7fr) minmax(82px, 0.35fr) minmax(310px, 1fr);
      gap: 14px;
      min-height: 24px;
      align-items: baseline;
    }

    .head {
      color: var(--dim);
      text-transform: lowercase;
    }

    .app-name {
      color: var(--hot);
    }

    .app-name:hover,
    .app-name:focus-visible {
      color: var(--info);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 0;
    }

    .tag {
      white-space: nowrap;
    }

    .tag::before {
      content: "[";
      color: var(--dead);
    }

    .tag::after {
      content: "]";
      color: var(--dead);
    }

    .tag-hub::after {
      content: "*]";
      color: var(--dead);
    }

    .tag.disabled {
      color: var(--dead);
      cursor: default;
    }

    .separator {
      color: var(--dead);
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }

    .log {
      position: relative;
      min-height: 0;
      padding: 2px 0 6px;
      overflow-x: hidden;
    }

    .cmd-block {
      padding-bottom: 14px;
    }

    .cmd-block.past {
      opacity: 0.58;
    }

    .cmd-block.past:hover,
    .cmd-block.past:focus-within {
      opacity: 1;
    }

    .cmd-block.boot {
      opacity: 1;
    }

    .line {
      min-height: 1.42em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .dossier {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 3px 14px;
      margin: 2px 0 0;
      max-width: 980px;
    }

    .label {
      color: var(--dim);
    }

    .span {
      grid-column: 1 / -1;
    }

    .inputbar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #000;
      padding-top: 2px;
    }

    .prompt {
      color: var(--ok);
      white-space: nowrap;
    }

    #cmd {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: #000;
      color: var(--fg);
      caret-color: var(--hot);
      padding: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .dim { color: var(--dim); }
    .soft { color: var(--soft); }
    .dead { color: var(--dead); }
    .hot { color: var(--hot); }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .violet { color: var(--violet); }
    .web { color: var(--web); }
    .windows { color: var(--windows); }
    .android { color: var(--android); }
    .store { color: var(--store); }
    .info { color: var(--info); }


    .visits-compact {
      margin: 0;
      max-width: 68ch;
    }
    .visits-line {
      min-height: 1.24em;
      line-height: 1.24;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .visits-sep { color: var(--dead); }
    .visits-k { color: var(--dim); }
    .visits-v { color: var(--hot); }
    .visits-live { color: var(--ok); }
    .visits-stale { color: var(--warn); }
    .visits-city { color: var(--soft); }
    .visits-city-link { color: var(--soft); text-decoration: none; cursor: pointer; }
    .visits-city-link:hover { color: var(--hot); text-decoration: underline; }

    @media (max-width: 820px) {
      html,
      body {
        font-size: 12px;
      }

      body {
        padding: max(9px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      }

      .terminal {
        height: calc(100svh - max(17px, env(safe-area-inset-top)) - max(14px, env(safe-area-inset-bottom)));
        grid-template-rows: auto minmax(128px, 42svh) 1fr auto;
        gap: 7px;
      }

      .topline {
        display: block;
      }

      .right {
        display: none;
      }

      .row {
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 2px 10px;
        padding: 4px 0;
      }

      .head {
        display: none;
      }

      .row > span:nth-child(3),
      .row > span:nth-child(4),
      .row > span:nth-child(5) {
        grid-column: 2;
      }

      .visits-compact {
        max-width: 100%;
      }

      .links {
        gap: 6px;
      }

      .dossier {
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 2px 10px;
      }
    }
  </style>
</head>

<body>
  <main class="terminal home" aria-label="BassThermal terminal">
    <header class="topline">
      <div class="brand"><strong>BASSTHERMAL</strong> / software index</div>
      <div class="right" id="readout">loading</div>
    </header>

    <section class="index" id="index" aria-label="Software index">
      <div class="table" id="appTable" role="list"></div>
      <div class="separator">──────────────────────────────────────────────────────────────────────────────</div>
    </section>

    <section class="log" id="log" aria-label="Command log" aria-live="polite"></section>

    <form class="inputbar" id="form" autocomplete="off">
      <label class="sr-only" for="cmd">Command</label>
      <span class="prompt">bt:~$</span>
      <input id="cmd" spellcheck="false" autocapitalize="none" autocomplete="off" inputmode="text" />
    </form>
  </main>

  <script>
    const STORE_HUB_WINDOWS = "https://apps.microsoft.com/search/publisher?name=BassThermal&hl=en-US&gl=CA";
    const STORE_HUB_ANDROID = "https://play.google.com/store/apps/developer?id=BassThermal";

    const apps = [
      {
        id: "01",
        slug: "dualticker",
        aliases: ["dt", "dual"],
        name: "DualTicker",
        klass: "signal/interface",
        status: "live",
        statusClass: "ok",
        platforms: ["web", "windows", "android"],
        category: "NewsApplication",
        line: "Parallel headline streams for monitoring live news coverage and comparing how stories move across sources.",

          ["android", "https://play.google.com/store/apps/details?id=com.bassthermal.dualtickerlens", true]
        ]
      },
      {

        aliases: ["retro", "retrofy"],
        name: "RetroFy",
        klass: "image/processor",
        status: "live",
        statusClass: "ok",
        platforms: ["windows", "android"],
        category: "MultimediaApplication",
        line: "Retro image conversion utility with palette, dithering, and pixel-output workflows.",
        capabilities: [

        ],

        ]
      },
      {

        status: "live",

        platforms: ["windows", "android"],

          ["android", "https://play.google.com/store/apps/details?id=com.bassthermal.copticdictionary", true]
        ]
      },
      {
        id: "04",
        slug: "icon-pack-builder",
        aliases: ["icon", "icons", "iconpack", "icon-pack"],
        name: "Icon Pack Builder",
        klass: "asset/compiler",
        status: "live",
        statusClass: "ok",
        platforms: ["windows"],
        category: "DeveloperApplication",
        line: "Icon-pack generation utility for turning source artwork into platform-ready icon assets.",
        capabilities: [

          "Desktop utility surface"
        ],
        links: [
          ["windows", "https://apps.microsoft.com/detail/9mxvt3dfq295?hl=en-US&gl=CA", true]
        ]
      },
      {
        id: "05",
        slug: "favicon-harvester",
        aliases: ["favicon", "favicons", "harvester"],
        name: "Favicon Harvester",
        klass: "web/extractor",
        status: "live",
        statusClass: "ok",
        platforms: ["windows"],
        category: "DeveloperApplication",
        line: "Desktop utility for extracting website favicons from URLs and domains.",
        capabilities: [
          "URL and domain input",
          "Favicon extraction",
          "Asset collection",
          "Developer and designer workflow"
        ],
        links: [
          ["windows", "https://apps.microsoft.com/detail/9mxj31fxcq4f?hl=en-US&gl=CA", true]
        ]
      },
      {
        id: "06",
        slug: "isbn-manager",
        aliases: ["isbn", "books"],
        name: "ISBN Manager",
        klass: "inventory/system",
        status: "live",
        statusClass: "ok",
        platforms: ["windows"],
        category: "BusinessApplication",
        line: "Book inventory workbench for ISBN lookup, catalog cleanup, barcode labels, and export-ready book data.",
        capabilities: [
          "ISBN lookup",
          "Book inventory cataloging",
          "Barcode label workflow",
          "Export-ready book data"
        ],
        links: [
          ["windows", "https://apps.microsoft.com/detail/9nr0nblx10fb?hl=en-US&gl=CA", true]
        ]
      },
      {
        id: "07",
        slug: "rss-finder",
        aliases: ["rss", "feed", "feeds"],
        name: "RSS Finder",
        klass: "feed/discovery",
        status: "lab",
        statusClass: "violet",
        platforms: ["web"],
        category: "DeveloperApplication",
        line: "Feed discovery and source inspection surface for RSS-heavy workflows.",
        capabilities: [
          "RSS discovery",
          "Feed inspection",
          "Source workflow support",
          "Lab-stage web surface"
        ],
        links: []
      }
    ];

    const appTable = document.getElementById("appTable");
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const cmd = document.getElementById("cmd");
    const readout = document.getElementById("readout");

    const history = [];
    let historyIndex = 0;

    function esc(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function platformClass(platform) {
      if (platform === "web") return "web";
      if (platform === "windows") return "windows";
      if (platform === "android") return "android";
      if (platform === "store") return "store";
      return "dead";
    }

    function renderLinks(app) {
      if (!app.links.length) return '<span class="tag disabled" aria-disabled="true">pending</span>';

      return app.links.map((link) => {
        const platform = link[0];
        const url = link[1];
        const direct = link[2];
        const title = direct ? `${app.name} ${platform}` : `${app.name} ${platform} publisher hub`;
        const hubClass = direct ? "" : " tag-hub";

        return `<a class="tag ${platformClass(platform)}${hubClass}" href="${esc(url)}" target="_blank" rel="noopener noreferrer" title="${esc(title)}" data-command="open ${esc(app.slug)} ${esc(platform)}" data-log-open="1">${esc(platform)}</a>`;
      }).join(" ");
    }

    function renderTable() {
      appTable.innerHTML = `
        <div class="row head" aria-hidden="true"><span>id</span><span>name</span><span>class</span><span>state</span><span>surface</span></div>
        <div class="row head" aria-hidden="true"><span>--</span><span>--------------------</span><span>------------------</span><span>--------</span><span>------------------------------</span></div>
        ${apps.map((app) => `
          <div class="row app-row" role="listitem">
            <span class="dim">${esc(app.id)}</span>
            <span><a class="app-name" href="/apps/${esc(app.slug)}/" data-command="info ${esc(app.slug)}">${esc(app.name)}</a></span>
            <span class="soft">${esc(app.klass)}</span>
            <span class="${esc(app.statusClass)}">${esc(app.status)}</span>
            <span class="links">${renderLinks(app)}</span>
          </div>
        `).join("")}
      `;
    }

    function updateReadout() {
      const live = apps.filter((app) => app.status === "live").length;
      const lab = apps.filter((app) => app.status !== "live").length;
      readout.textContent = `live:${live} lab:${lab}`;
    }

    function findApp(token) {
      const q = String(token || "").trim().toLowerCase();
      if (!q) return null;

      return apps.find((app) =>
        app.slug === q ||
        app.id === q.padStart(2, "0") ||
        app.name.toLowerCase() === q ||
        app.aliases.includes(q)
      );
    }

    function activeLinks(app) {
      return app.links.filter((link) => link[1]);
    }

    function commandLine(text) {
      return `<div class="line"><span class="prompt">bt:~$</span> ${esc(text)}</div>`;
    }

    function dossier(app) {
      const links = renderLinks(app);
      const caps = app.capabilities.map((item) => `<div class="span line">- ${esc(item)}</div>`).join("");

      return `
        <div class="line hot">${esc(app.name.toUpperCase())}</div>
        <div class="dossier">
          <div class="label">class</div><div class="soft">${esc(app.klass)}</div>
          <div class="label">state</div><div class="${esc(app.statusClass)}">${esc(app.status)}</div>
          <div class="label">surface</div><div class="links">${links}</div>
          <div class="label">record</div><div><a class="tag info" href="/apps/${esc(app.slug)}/">page</a></div>
          <div class="span line"></div>
          <div class="span line">${esc(app.line)}</div>
          <div class="span line"></div>
          <div class="label">cap</div><div></div>
          ${caps}
        </div>
      `;
    }

    function helpOutput() {
      return `
        <div class="line hot">COMMANDS</div>
        <div class="dossier">
          <div class="label">info</div><div>info dualticker · info retrofy · info coptic</div>
          <div class="label">open</div><div>open dualticker web · open retrofy windows</div>
          <div class="label">index</div><div>apps · live · stores · privacy · about · clear</div>
          <div class="label">keys</div><div>up/down history · shift+up/down scroll</div>
        </div>
      `;
    }

    function appsOutput(filter) {
      const matches = apps.filter((app) => !filter || app.status === filter);

      return matches.map((app) => `
        <div class="line"><span class="dim">${esc(app.id)}</span>  <a class="hot" href="/apps/${esc(app.slug)}/">${esc(app.name)}</a>  <span class="soft">${esc(app.klass)}</span>  <span class="${esc(app.statusClass)}">${esc(app.status)}</span></div>
      `).join("") || `<div class="line dim">no matching systems</div>`;
    }

    function storesOutput() {
      return `
        <div class="line hot">STORE SURFACES</div>
        <div class="dossier">
          <div class="label">windows</div><div><a class="tag windows" href="${esc(STORE_HUB_WINDOWS)}" target="_blank" rel="noopener noreferrer">publisher</a></div>
          <div class="label">android</div><div><a class="tag android" href="${esc(STORE_HUB_ANDROID)}" target="_blank" rel="noopener noreferrer">developer</a></div>
          <div class="label">web</div><div><a class="tag web" href="https://www.dualticker.com/" target="_blank" rel="noopener noreferrer">dualticker</a></div>
        </div>
      `;
    }

    function aboutOutput() {
      return `<div class="line hot">BASSTHERMAL</div><div class="line dim">index ready · click app name or type help</div>`;
    }

    function openOutput(parts) {
      const app = findApp(parts[1]);
      const platform = (parts[2] || "").toLowerCase();

      if (!app) return `<div class="line bad">unknown target</div>`;

      const links = activeLinks(app);
      if (!links.length) return `<div class="line dim">no public surface</div>`;

      const link = platform ? links.find((item) => item[0] === platform) : links[0];
      sendVisit("click", { target: link ? link[1] : "", appSlug: app.slug });
      if (!link) return `<div class="line bad">surface unavailable</div>`;

      window.open(link[1], "_blank", "noopener,noreferrer");

      return `<div class="line">opening <span class="hot">${esc(app.name)}</span> <span class="${platformClass(link[0])}">${esc(link[0])}</span>${link[2] ? "" : '<span class="dim">*</span>'}</div>`;
    }

    function route(raw) {
      const text = raw.trim();
      const normalized = text.toLowerCase().replace(/\s+/g, " ");
      const parts = normalized.split(" ");

      if (!normalized || normalized === "help" || normalized === "?") return helpOutput();
      if (normalized === "clear" || normalized === "cls") return "__CLEAR__";
      if (normalized === "about") return aboutOutput();
      if (normalized === "apps" || normalized === "index" || normalized === "ls") return appsOutput();
      if (normalized === "live") return appsOutput("live");
      if (normalized === "stores" || normalized === "links") return storesOutput();

      if (parts[0] === "info") {
        const app = findApp(parts.slice(1).join(" ")) || findApp(parts[1]);
        return app ? dossier(app) : `<div class="line bad">unknown system</div>`;
      }

      if (parts[0] === "open") return openOutput(parts);

      const direct = findApp(normalized);
      if (direct) return dossier(direct);

      return `<div class="line bad">unknown command</div><div class="line dim">help</div>`;
    }

    function scrollBlockToTop(block) {
      if (!block || !block.isConnected) return;

      requestAnimationFrame(() => {
        const logRect = log.getBoundingClientRect();
        const blockRect = block.getBoundingClientRect();
        log.scrollTop += blockRect.top - logRect.top;
      });
    }

    function appendCommand(text, options = {}) {
      const output = route(text);

      if (output === "__CLEAR__") {
        stopVisitsMonitor();
        log.innerHTML = "";
        return;
      }

      [...log.querySelectorAll(".cmd-block")].forEach((block) => block.classList.add("past"));

      const block = document.createElement("div");
      block.className = "cmd-block";
      block.innerHTML = commandLine(text) + output;
      log.appendChild(block);

      if (!options.noScroll) {
        scrollBlockToTop(block);
      }
    }


    function padRight(value, width) {
      const text = String(value);
      if (text.length >= width) return text;
      return text + " ".repeat(width - text.length);
    }

    function padLeft(value, width) {
      const text = String(value);
      if (text.length >= width) return text;
      return " ".repeat(width - text.length) + text;
    }

    function safeLabel(value, maxLength) {
      const text = String(value ?? "").replace(/\s+/g, " ").trim() || "unknown";
      if (!maxLength || text.length <= maxLength) return text;
      return `${text.slice(0, Math.max(1, maxLength - 1))}…`;
    }

    function compactList(items, maxItems) {
      const source = Array.isArray(items) ? items.filter(Boolean) : [];
      const limit = Math.max(1, maxItems || source.length);
      const visible = source.slice(0, limit);
      const hidden = source.length - visible.length;
      return {
        text: visible.join(" "),
        hidden
      };
    }

    function compactTabDuration(value) {
      const text = String(value || "0s").trim();
      const m = text.match(/^(?:(\d+)h\s*)?(?:(\d+)m)?$/i);
      if (!m) return text;
      const h = m[1] ? `${Number(m[1])}h` : "";
      const mins = m[2] ? `${Number(m[2])}m` : "";
      return `${h}${mins}` || text;
    }
    function shortClickLabel(raw) {
      const s = String(raw || "").toLowerCase();
      const map = {
        "rss-finder": "rss",
        "isbn-manager": "isbn",
        "coptic-dictionary": "coptic",
        "icon-pack-builder": "icon",
        "favicon-harvester": "favicon",
        "apps.microsoft.com": "ms",
        "play.google.com": "play",
        dualticker: "dt",
        retrofy: "retro"
      };
      if (map[s]) return map[s];
      return safeLabel(String(raw || "internal"), 12).replace(/…$/, "");
    }

    function kv(label, value, valueClass = "visits-v") {
      return `<span class="visits-k">${esc(label)}</span> <span class="${esc(valueClass)}">${esc(value)}</span>`;
    }

    const VISITS_REFRESH_MS = 15000;

    function currentAppSlug() {
      const seg = location.pathname.split("/").filter(Boolean);
      return seg[0] === "apps" && seg[1] ? seg[1] : "";
    }
    const visitsMonitor = {
      timer: null,
      block: null,
      body: null,
      lastData: null,
      active: false,
      inFlight: false
    };

    function renderVisitsOutput(data, state = {}) {
      const totals = data?.totals || {};
      const generatedAt = data?.generatedAt || "";
      const dt = new Date(generatedAt);
      const timeLabel = Number.isNaN(dt.getTime())
        ? safeLabel(generatedAt, 16)
        : dt.toLocaleTimeString([], { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
      const status = state.stale ? "STALE" : "LIVE";
      const geoItems = (data.countriesActive || []).map((x) => `${safeLabel(x.country || "--", 3)}:${x.sessions ?? 0}`);
      const hotItems = (data.citiesActive || []).map((x) => `${safeLabel(x.city || "unknown", 14)}:${x.sessions ?? 0}/${safeLabel(x.ageLabel || "0s", 5)}`);
      const hot = compactList(hotItems, 5);
      const CITY_COL_W = 16;
      const SES_COL_W = 4;
      const VIEW_COL_W = 5;
      const TAB_COL_W = 7;
      const LAST_COL_W = 9;
      const rows = (data.citiesToday || []).slice(0, 8).map((x) => {
        const cityLabel = safeLabel(`${x.city || "unknown"} ${x.country || "--"}`, CITY_COL_W);
        return {
          city: x.city || "unknown",
          country: x.country || "--",
          line: `${padRight(cityLabel, CITY_COL_W)}${padLeft(x.sessions ?? 0, SES_COL_W)}${padLeft(x.pageViews ?? 0, VIEW_COL_W)}${padLeft(safeLabel(compactTabDuration(x.tabTimeLabel || "0s"), TAB_COL_W), TAB_COL_W)}${padLeft(safeLabel(x.lastSeenTime || "--:--:--", LAST_COL_W), LAST_COL_W)}`
        };
      });
      const hiddenCities = Math.max(0, (data.citiesToday || []).length - rows.length);
      const clicksItems = (data.clicksToday || []).map((x) => `${shortClickLabel(x.appSlug || x.targetHost || x.target || "internal")}:${x.clicks ?? 0}`);
      const clicks = compactList(clicksItems, 6);
      const clicksToday = totals.clicksToday ?? 0;

      const line2 = [
        kv("act", totals.activeSessions ?? 0),
        kv("today", totals.sessionsToday ?? 0),
        kv("views", totals.pageViewsToday ?? 0),
        ...(clicksToday > 0 ? [kv("clicks", clicksToday)] : []),
        kv("tab", totals.tabTimeTodayLabel ?? "0s", "")
      ].join("   ");

      const geoText = geoItems.length ? geoItems.join(" ") : "none";
      const hotText = `${hot.text || "none"}${hot.hidden > 0 ? ` +${hot.hidden}` : ""}`;
      const mergedGeoHot = `geo ${geoText}        hot ${hotText}`;
      const shouldMergeGeoHot = mergedGeoHot.length <= 66;

      const header = `${padRight("city", CITY_COL_W)}${padLeft("ses", SES_COL_W)}${padLeft("view", VIEW_COL_W)}${padLeft("tab", TAB_COL_W)}${padLeft("last", LAST_COL_W)}`;
      const separator = "─".repeat(header.length);
      const tableRows = rows.length ? rows : [{ line: "none", city: "", country: "" }];

      const lines = [
        `<div class="visits-line"><span class="visits-live${state.stale ? " visits-stale" : ""}">● ${esc(status)}</span> ${esc(timeLabel)}  <span class="visits-k">r15s</span></div>`,
        `<div class="visits-line">${line2}</div>`
      ];

      if (shouldMergeGeoHot) {
        lines.push(`<div class="visits-line">${kv("geo", geoText, "")}        ${kv("hot", hotText, "visits-city")}</div>`);
      } else {
        lines.push(`<div class="visits-line">${kv("geo", geoText, "")}</div>`);
        lines.push(`<div class="visits-line">${kv("hot", hotText, "visits-city")}</div>`);
      }

      lines.push(
        "<div class=\"visits-line\"></div>",
        `<div class="visits-line"><span class="visits-k">${esc(header)}</span></div>`,
        `<div class="visits-line visits-sep">${esc(separator)}</div>`
      );

      lines.push(...tableRows.map((row) => {
        if (!row.city) return `<div class="visits-line"><span class="visits-city">${esc(row.line)}</span></div>`;
        const cmd = `city ${row.city} ${row.country}`;
        return `<div class="visits-line"><a class="visits-city-link" data-command="${esc(cmd)}">${esc(row.line.trimEnd())}</a></div>`;
      }));
      if (hiddenCities > 0) lines.push(`<div class="visits-line"><span class="visits-k">...</span> +${esc(hiddenCities)} <span class="visits-k">cities</span></div>`);
      if (clicksToday > 0 && clicks.text) lines.push("<div class=\"visits-line\"></div>", `<div class="visits-line">${kv("click", `${clicks.text}${clicks.hidden > 0 ? ` +${clicks.hidden}` : ""}`, "")}</div>`);

      return `<div class="visits-compact">${lines.join("")}</div>`;
    }

    function renderVisitsError(message, previousData) {
      if (previousData) return renderVisitsOutput(previousData, { stale: true });
      return `<div class="line bad">${esc(message)}</div>`;
    }
    function renderCityReport(data) {
      const t = data?.totals || {};
      const sig = data?.signal || { label: "normal", reasons: [] };
      const sigClass = sig.label === "suspect" ? "warn" : (sig.label === "bot" ? "bad" : "ok");
      const section = (name, rows) => rows?.length ? `<div class="line dim">${esc(name)}</div>${rows.join("")}` : "";
      return `<div class="visits-compact">
<div class="line hot">CITY ${esc(data.city)} ${esc(data.country)}</div>
<div class="line">seen ${esc(t.lastSeenTime || "--:--:--")}  ses ${esc(t.sessions ?? 0)}  views ${esc(t.pageViews ?? 0)}  clicks ${esc(t.clicks ?? 0)}  tab ${esc(compactTabDuration(t.tabTimeLabel || "0s"))}</div>
<div class="line"><span class="dim">signal</span> <span class="${sigClass}">${esc(sig.label || "normal")}</span>${sig.reasons?.length ? `  <span class="dim">${esc(sig.reasons.join("/"))}</span>` : ""}</div>
<div class="line"></div>
${section("paths", (data.paths || []).map((x) => `<div class="line">${esc(padRight(safeLabel(x.path || "/", 20), 20))} ${esc(padLeft(x.views || 0, 3))}</div>`))}
${data.clicks?.length ? `<div class="line"></div>${section("click", (data.clicks || []).map((x) => `<div class="line">${esc(padRight(safeLabel(x.label || "internal", 20), 20))} ${esc(padLeft(x.clicks || 0, 3))}</div>`))}` : ""}
${data.devices?.length ? `<div class="line"></div>${section("devices", (data.devices || []).map((x) => `<div class="line">${esc(padRight(safeLabel(x.device || "unknown", 20), 20))} ${esc(padLeft(x.sessions || 0, 3))}</div>`))}` : ""}
${data.referrers?.length ? `<div class="line"></div>${section("refs", (data.referrers || []).map((x) => `<div class="line">${esc(padRight(safeLabel(x.referrerHost || "direct", 20), 20))} ${esc(padLeft(x.sessions || 0, 3))}</div>`))}` : ""}
${data.timeline?.length ? `<div class="line"></div>${section("timeline", (data.timeline || []).map((x) => `<div class="line">${esc(x.time || "--:--")} ${esc(x.type || "event")} ${esc(safeLabel(x.label || "activity", 36))}</div>`))}` : ""}
</div>`;
    }
    async function runCityCommand(text) {
      const m = text.trim().match(/^\/?city\s+(.+?)\s+([A-Za-z]{2,3})$/i);
      if (!m) return false;
      const city = m[1].trim();
      const country = m[2].trim().toUpperCase();
      const commandText = `city ${city} ${country}`;
      [...log.querySelectorAll(".cmd-block")].forEach((block) => block.classList.add("past"));
      const block = document.createElement("div");
      block.className = "cmd-block";
      block.innerHTML = commandLine(commandText) + '<div class="line dim">loading city report…</div>';
      log.appendChild(block);
      scrollBlockToTop(block);
      try {
        const res = await fetch(`/api/visits/city?city=${encodeURIComponent(city)}&country=${encodeURIComponent(country)}`, { headers: { accept: "application/json", "cache-control": "no-cache" } });
        const data = await res.json();
        if (!res.ok || !data?.ok) throw new Error("request_failed");
        block.innerHTML = commandLine(commandText) + renderCityReport(data);
      } catch {
        block.innerHTML = commandLine(commandText) + '<div class="line bad">city report unavailable</div>';
      }
      return true;
    }

    function stopVisitsMonitor() {
      if (visitsMonitor.timer) clearTimeout(visitsMonitor.timer);
      visitsMonitor.timer = null;
      visitsMonitor.active = false;
      visitsMonitor.inFlight = false;
    }

    function scheduleVisitsRefresh() {
      if (!visitsMonitor.active) return;
      if (document.visibilityState !== "visible") return;
      visitsMonitor.timer = setTimeout(() => refreshVisitsMonitor(), VISITS_REFRESH_MS);
    }

    async function refreshVisitsMonitor() {
      if (!visitsMonitor.active || !visitsMonitor.body || visitsMonitor.inFlight) return;
      if (document.visibilityState !== "visible") return;
      visitsMonitor.inFlight = true;
      try {
        const res = await fetch(`/api/visits/summary?ts=${Date.now()}`, {
          headers: { accept: "application/json", "cache-control": "no-cache" }
        });
        if (!res.ok) throw new Error("request_failed");
        const data = await res.json();
        if (!data?.ok) throw new Error("invalid_response");
        visitsMonitor.lastData = data;
        visitsMonitor.body.innerHTML = renderVisitsOutput(data, { stale: false });
      } catch {
        visitsMonitor.body.innerHTML = renderVisitsError("signal stale · retrying", visitsMonitor.lastData);
      } finally {
        visitsMonitor.inFlight = false;
        scheduleVisitsRefresh();
      }
    }

    function startVisitsMonitor(commandText) {
      stopVisitsMonitor();
      [...log.querySelectorAll(".cmd-block")].forEach((block) => block.classList.add("past"));
      const block = document.createElement("div");
      block.className = "cmd-block";
      block.innerHTML = commandLine(commandText);
      const body = document.createElement("div");
      body.innerHTML = '<div class="line dim">loading visits…</div>';
      block.appendChild(body);
      log.appendChild(block);
      scrollBlockToTop(block);
      visitsMonitor.block = block;
      visitsMonitor.body = body;
      visitsMonitor.lastData = null;
      visitsMonitor.active = true;
      refreshVisitsMonitor();
    }

    const VISIT_SESSION_KEY = 'bt_visit_session_id';

    function getVisitSessionId() {
      let id = sessionStorage.getItem(VISIT_SESSION_KEY);
      if (!id) {
        id = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`);
        sessionStorage.setItem(VISIT_SESSION_KEY, id);
      }
      return id;
    }

    function sendVisit(type, extras = {}) {
      const payload = {
        type,
        sessionId: getVisitSessionId(),
        path: location.pathname,
        referrer: document.referrer || '',
        appSlug: currentAppSlug(),
        ...extras
      };
      const body = JSON.stringify(payload);
      if (navigator.sendBeacon) {
        const ok = navigator.sendBeacon('/api/visit', new Blob([body], { type: 'application/json' }));
        if (ok) return;
      }
      fetch('/api/visit', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body,
        keepalive: true
      }).catch(() => {});
    }

    function bootLog() {
      log.innerHTML = `
        <div class="cmd-block boot">
          <div class="line hot">BASSTHERMAL</div>
          <div class="line dim">index ready · <a href="/privacy/">privacy</a> · click app name or type help</div>
        </div>
      `;
      log.scrollTop = 0;
    }

    renderTable();
    updateReadout();
    bootLog();

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-command]");
      if (!trigger) return;

      const text = trigger.getAttribute("data-command");
      if (!text) return;

      event.preventDefault();
      const normalized = text.trim().toLowerCase().replace(/\s+/g, " ");
      if (normalized.startsWith("info ")) {
        const infoApp = findApp(normalized.slice(5));
        if (infoApp) sendVisit("click", { target: `internal:info:${infoApp.slug}`, appSlug: infoApp.slug });
      }

      if (await runCityCommand(text)) {
      } else if (normalized === "/visits") {
        startVisitsMonitor(text);
      } else if (normalized === "/visits off") {
        stopVisitsMonitor();
        appendCommand(text);
        const lastBlock = log.lastElementChild;
        if (lastBlock) lastBlock.innerHTML = commandLine(text) + "<div class=\"line dim\">visits monitor stopped</div>";
      } else {
        appendCommand(text);
      }

      if (!trigger.matches("a[data-log-open]")) {
        cmd.focus({ preventScroll: true });
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = cmd.value.trim();
      if (!text) return;

      history.push(text);
      historyIndex = history.length;

      const normalized = text.trim().toLowerCase().replace(/\s+/g, " ");
      if (normalized.startsWith("info ")) {
        const infoApp = findApp(normalized.slice(5));
        if (infoApp) sendVisit("click", { target: `internal:info:${infoApp.slug}`, appSlug: infoApp.slug });
      }

      if (await runCityCommand(text)) {
      } else if (normalized === "/visits") {
        startVisitsMonitor(text);
      } else if (normalized === "/visits off") {
        stopVisitsMonitor();
        appendCommand(text);
        const lastBlock = log.lastElementChild;
        if (lastBlock) lastBlock.innerHTML = commandLine(text) + "<div class=\"line dim\">visits monitor stopped</div>";
      } else {
        appendCommand(text);
      }
      cmd.value = "";
    });

    cmd.addEventListener("keydown", (event) => {
      if (event.shiftKey && event.key === "ArrowUp") {
        event.preventDefault();
        log.scrollTop -= 42;
        return;
      }

      if (event.shiftKey && event.key === "ArrowDown") {
        event.preventDefault();
        log.scrollTop += 42;
        return;
      }

      if (event.key === "PageUp") {
        event.preventDefault();
        log.scrollTop -= log.clientHeight * 0.82;
        return;
      }

      if (event.key === "PageDown") {
        event.preventDefault();
        log.scrollTop += log.clientHeight * 0.82;
        return;
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();

        if (historyIndex > 0) {
          historyIndex--;
          cmd.value = history[historyIndex] || "";
        }

        return;
      }

      if (event.key === "ArrowDown") {
        event.preventDefault();

        if (historyIndex < history.length - 1) {
          historyIndex++;
          cmd.value = history[historyIndex] || "";
        } else {
          historyIndex = history.length;
          cmd.value = "";
        }
      }
    });

    window.addEventListener("click", () => {
      cmd.focus({ preventScroll: true });
    });

    document.addEventListener("click", (event) => {
      const anchor = event.target.closest("a[href]");
      if (!anchor) return;
      if (anchor.hostname === location.hostname) return;
      sendVisit("click", { target: anchor.href });
    }, true);

    sendVisit("pageview");
    setInterval(() => {
      if (document.visibilityState === "visible") sendVisit("heartbeat");
    }, 30000);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") sendVisit("heartbeat");
      if (!visitsMonitor.active) return;
      if (document.visibilityState === "visible") {
        if (visitsMonitor.timer) clearTimeout(visitsMonitor.timer);
        refreshVisitsMonitor();
      } else if (visitsMonitor.timer) {
        clearTimeout(visitsMonitor.timer);
        visitsMonitor.timer = null;
      }
    });
  </script>
</body>
</html>
