<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BassThermal</title>
    <meta
      name="description"
      content="BassThermal — independent software, tools, experiments, and weird useful internet machinery."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0d12;
        --panel: #10161f;
        --text: #e6edf5;
        --muted: #9aabbe;
        --line: #243042;
        --accent: #7ec4ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.55;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      main {
        width: min(680px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: clamp(1.25rem, 2vw + 0.75rem, 2rem);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.9rem, 2.3vw + 1.2rem, 2.6rem);
        letter-spacing: 0.01em;
      }

      p {
        margin: 0.9rem 0 0;
        color: var(--muted);
        max-width: 58ch;
      }

      nav {
        margin-top: 1.4rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.45rem 0.8rem;
        font-weight: 550;
      }

      a:hover,
      a:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      footer {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BassThermal</h1>
      <p>Independent software, tools, experiments, and weird useful internet machinery.</p>
      <nav aria-label="Primary links">
        <a href="#" aria-label="DualTicker (placeholder)">DualTicker</a>
        <a href="#" aria-label="Apps (placeholder)">Apps</a>
        <a href="#" aria-label="Contact (placeholder)">Contact</a>
      </nav>
      <footer>Cloudflare Worker static assets deployment is active.</footer>
    </main>
  </body>
</html>
