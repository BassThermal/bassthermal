<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>BassThermal Related Apps Demo</title><style>body{background:#090b0d;color:#d8dde2;font:14px/1.4 ui-monospace,Menlo,Consolas,monospace;padding:20px}main{max-width:920px;margin:0 auto}h1{font-size:16px}label{font-size:12px;color:#9aa5b1}select,input{background:#101317;color:#d8dde2;border:1px solid #27313b;padding:4px 6px}pre{background:#0d1115;border:1px solid #27313b;padding:10px;white-space:pre-wrap}.controls{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin:14px 0}.panel{margin-top:14px}</style></head><body><main><h1>BT-RECOMMENDER-1 demo</h1><p>Compact in-app “See more tools” panel rendered from <code>/related-apps.v1.js</code>.</p><div class="controls"><div><label for="app">Current app</label><br/><select id="app"><option>dualticker</option><option selected>retrofy</option><option>coptic-dictionary</option><option>icon-pack-builder</option><option>favicon-harvester</option><option>isbn-manager</option><option>rss-finder</option></select></div><div><label for="limit">Limit</label><br/><select id="limit"><option>2</option><option selected>3</option><option>4</option><option>6</option></select></div><div><label><input type="checkbox" id="debug"/> debug</label></div></div><div id="embed" class="panel" data-bt-related data-current-app="retrofy" data-limit="3"></div><h2 style="font-size:13px">Embed snippet</h2><pre id="snippet"></pre></main><script src="/related-apps.v1.js"></script><script>const app=document.getElementById('app');const limit=document.getElementById('limit');const debug=document.getElementById('debug');const embed=document.getElementById('embed');const snippet=document.getElementById('snippet');function refresh(){embed.setAttribute('data-current-app',app.value);embed.setAttribute('data-limit',limit.value);if(debug.checked){embed.setAttribute('data-debug','1')}else{embed.removeAttribute('data-debug')}window.BTRelated.render(embed,{currentApp:app.value,limit:Number(limit.value),debug:debug.checked});snippet.textContent=`<div data-bt-related data-current-app="${app.value}" data-limit="${limit.value}"${debug.checked?' data-debug="1"':''}></div>\n<script src="https://bassthermal.com/related-apps.v1.js"></`+`script>`;}[app,limit,debug].forEach(el=>el.addEventListener('change',refresh));refresh();</script></body></html>
